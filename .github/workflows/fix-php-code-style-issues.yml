name: Check PHP code style

on:
  push:
    branches: [main]
    paths:
      - '**.php'
  pull_request:
    paths:
      - '**.php'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  php-code-styling:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Check PHP code style
        uses: aglipanci/laravel-pint-action@2.6
        with:
          testMode: true
